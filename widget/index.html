<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteGrapher</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/vendor/d3.min.js"></script>
    <script>
      if (typeof d3 === 'undefined') {
        document.write(
          '<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"><\/script>'
        );
      }
    </script>
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <span class="brand-icon">◈</span>
        <h1>RouteGrapher</h1>
        <span class="brand-sub">Live Execution Tracer</span>
      </div>
      <div class="status" id="connection-status">
        <span class="status-dot disconnected"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </header>

    <main class="layout">
      <aside class="request-list" id="request-list">
        <div class="panel-header">
          <h2>Requests</h2>
          <span class="badge" id="request-count">0</span>
        </div>
        <ul id="request-items"></ul>
        <p class="empty-state" id="empty-state">Listening for requests…</p>
      </aside>

      <section class="trace-detail">
        <div class="panel-header">
          <h2 id="trace-title">Select a request</h2>
          <div class="view-tabs">
            <button class="tab active" data-view="graph">Graph</button>
            <button class="tab" data-view="timeline">Timeline</button>
          </div>
        </div>

        <div class="trace-views">
          <div id="graph-view" class="view active">
            <svg id="graph-svg"></svg>
            <div class="graph-controls">
              <span class="graph-hint">Drag canvas to pan · drag nodes to move · scroll to zoom</span>
              <button type="button" id="graph-zoom-out" title="Zoom out">−</button>
              <button type="button" id="graph-zoom-reset" title="Fit to view">Fit</button>
              <button type="button" id="graph-zoom-in" title="Zoom in">+</button>
            </div>
            <div id="node-tooltip" class="tooltip hidden"></div>
          </div>
          <div id="timeline-view" class="view"></div>
        </div>

        <div id="node-detail" class="node-detail hidden">
          <h3>Node Details</h3>
          <dl id="node-detail-content"></dl>
        </div>

        <div id="source-peek" class="source-peek hidden">
          <div class="source-peek-header">
            <h3>Source</h3>
            <span id="source-peek-path" class="source-peek-path"></span>
          </div>
          <pre id="source-peek-content" class="source-peek-content"></pre>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
    <script src="/db-language.js"></script>
    <script src="/graph.js"></script>
    <script src="/timeline.js"></script>
  </body>
</html>
